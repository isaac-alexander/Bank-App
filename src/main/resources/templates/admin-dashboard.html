<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h3 class="text-danger">Admin Dashboard</h3>

    <!-- USERS -->
    <h5 class="mt-4">Users</h5>

    <table class="table table-bordered">
        <tr>
            <th>Username</th>
            <th>Phone</th>
            <th>Role</th>
        </tr>

        <tr th:each="u : ${users}">
            <td th:text="${u.username}"></td>
            <td th:text="${u.phoneNumber}"></td>
            <td th:text="${u.role}"></td>
        </tr>
    </table>

    <!-- ACCOUNTS -->
    <h5 class="mt-4">Accounts</h5>

    <table class="table table-bordered">
        <tr>
            <th>Account Name</th>
            <th>Account Number</th>
            <th>Type</th>
            <th>Balance</th>
            <th>Actions</th>
        </tr>

        <tr th:each="a : ${accounts}">
            <td th:text="${a.user.username}"></td> <!-- shows account owner -->
            <td th:text="${a.accountNumber}"></td>
            <td th:text="${a.accountType}"></td> <!-- fixed -->
            <td th:text="${a.balance}"></td>

            <td>
                <a th:href="@{'/transactions/admin/deposit/' + ${a.id}}"
                   class="btn btn-success btn-sm">
                    Deposit
                </a>

                <a th:href="@{'/transactions/admin/withdraw/' + ${a.id}}"
                   class="btn btn-danger btn-sm">
                    Withdraw
                </a>
            </td>
        </tr>
    </table>

</div>

</body>
</html>
