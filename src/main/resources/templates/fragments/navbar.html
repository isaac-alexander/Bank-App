<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- navbar fragment -->
<div th:fragment="navbar">

    <!-- green navbar -->
    <nav class="navbar navbar-expand-lg" style="background-color:#198754;">

        <div class="container">

            <!-- app name -->
            <a class="navbar-brand text-white" th:href="@{/dashboard}">
                Bank App
            </a>

            <!-- navigation buttons -->
            <div>

                <!-- dashboard (customer) -->
                <a class="btn btn-outline-light me-2"
                   th:if="${session.loggedInUser != null and session.loggedInUser.role == 'CUSTOMER'}"
                   th:href="@{/dashboard}">
                    Dashboard
                </a>

                <!-- accounts (customer) -->
                <a class="btn btn-outline-light me-2"
                   th:if="${session.loggedInUser != null and session.loggedInUser.role == 'CUSTOMER'}"
                   th:href="@{/accounts}">
                    Accounts
                </a>

                <!-- admin dashboard -->
                <a class="btn btn-outline-light me-2"
                   th:if="${session.loggedInUser != null and session.loggedInUser.role == 'ADMIN'}"
                   th:href="@{/admin}">
                    Admin Dashboard
                </a>

                <!-- view all users -->
                <a class="btn btn-outline-light me-2"
                   th:if="${session.loggedInUser != null and session.loggedInUser.role == 'ADMIN'}"
                   th:href="@{/admin/users}">
                    Users
                </a>

                <!-- view all transactions -->
                <a class="btn btn-outline-light me-2"
                   th:if="${session.loggedInUser != null and session.loggedInUser.role == 'ADMIN'}"
                   th:href="@{/transactions/admin/all}">
                    Transactions
                </a>

                <!-- (ALL USERS)-->
                <a class="btn btn-outline-danger"
                   th:if="${session.loggedInUser != null}"
                   th:href="@{/logout}">
                    Logout
                </a>

            </div>

        </div>

    </nav>

</div>

</body>
</html>
