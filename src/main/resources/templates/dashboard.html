<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid">

    <div class="row">

        <!-- sidebar -->
        <div class="col-md-2 sidebar">

            <a th:href="@{/dashboard}">Dashboard</a>

            <!-- customer -->
            <a sec:authorize="hasRole('CUSTOMER')"
               th:if="${account != null}"
               th:href="@{'/transactions/' + ${account.id}}">
                Transactions
            </a>

            <!-- admin -->
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/transactions/admin/all}">
                All Transactions
            </a>

            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/admin/users}">
                Users
            </a>

            <a th:href="@{/user/edit}">Edit Profile</a>

            <a th:href="@{/logout}">Logout</a>

        </div>

        <!-- main content -->
        <div class="col-md-10 p-4">

            <div class="welcome-card">
                <h3 class="page-title">
                    Welcome, <span th:text="${user.username}"></span>
                </h3>
            </div>

            <!-- CUSTOMER VIEW -->
            <div sec:authorize="hasRole('CUSTOMER')">

                <div class="card p-3 mt-3">

                    <h5>User Details</h5>

                    <p><strong>First Name:</strong> <span th:text="${user.firstName}"></span></p>
                    <p><strong>Last Name:</strong> <span th:text="${user.lastName}"></span></p>
                    <p><strong>Date of Birth:</strong> <span th:text="${user.dateOfBirth}"></span></p>
                    <p><strong>Address:</strong> <span th:text="${user.address}"></span></p>

                </div>

                <div th:if="${account != null}" class="account-wrapper mt-3">

                    <div class="account-circle">

                        <small>Account Number</small>
                        <h5 th:text="${account.accountNumber}"></h5>

                        <small>Account Type</small>
                        <h5 th:text="${account.accountType}"></h5>

                        <small>Balance</small>
                        <h5 th:text="${account.balance}"></h5>

                    </div>

                    <div class="card p-3 mt-3">

                        <h5>Quick Actions</h5>

                        <a class="btn btn-success mb-2"
                           th:href="@{'/transactions/transfer/' + ${account.id}}">
                            Transfer
                        </a>

                        <a class="btn btn-primary mb-2"
                           th:href="@{'/transactions/' + ${account.id}}">
                            View Transactions
                        </a>

                    </div>

                </div>

            </div>

            <!-- ADMIN VIEW -->
            <div sec:authorize="hasRole('ADMIN')">

                <div class="mb-3">
                    <a href="/admin/users" class="btn btn-outline-primary">Users</a>
                    <a href="/transactions/admin/all" class="btn btn-outline-dark">Transactions</a>
                </div>

                <div class="card mb-4">
                    <div class="card-body">

                        <h5>Users</h5>

                        <table class="table">
                            <tr th:each="u : ${users}">
                                <td th:text="${u.username}"></td>
                                <td th:text="${u.phoneNumber}"></td>
                                <td th:text="${u.role}"></td>
                            </tr>
                        </table>

                    </div>
                </div>

                <div class="card">
                    <div class="card-body">

                        <h5>Accounts</h5>

                        <table class="table">
                            <tr th:each="a : ${accounts}">
                                <td th:text="${a.user.username}"></td>
                                <td th:text="${a.accountNumber}"></td>
                                <td th:text="${a.accountType}"></td>
                                <td th:text="${a.balance}"></td>

                                <td>
                                    <a th:href="@{'/transactions/admin/deposit/' + ${a.id}}"
                                       class="btn btn-success btn-sm">Deposit</a>

                                    <a th:href="@{'/transactions/admin/withdraw/' + ${a.id}}"
                                       class="btn btn-danger btn-sm">Withdraw</a>
                                </td>
                            </tr>
                        </table>

                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
