<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* sidebar styling */
        .sidebar {
            height: 100vh;
            background-color: #f8f9fa;
            padding-top: 20px;
        }

        /* circle for account display */
        .account-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: #198754;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: auto;
        }

    </style>
</head>

<body>

<!-- navbar -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid">

    <div class="row">

        <!-- sidebar -->
        <div class="col-md-2 sidebar">

            <ul class="nav flex-column">

                <!-- dashboard link -->
                <li class="nav-item">
                    <a class="nav-link text-success" href="/dashboard">Dashboard</a>
                </li>

                <!-- accounts link -->
                <li class="nav-item">
                    <a class="nav-link text-success" href="/accounts">Accounts</a>
                </li>

            </ul>

        </div>

        <!-- main content -->
        <div class="col-md-10 mt-4">

            <!-- welcome user -->
            <h2 class="text-success">
                Welcome, <span th:text="${user.username}"></span>
            </h2>

            <!-- account section -->
            <!-- if account exists -->
            <div th:if="${account != null}" class="row mt-4">

                <!-- account circle -->
                <div class="col-md-4">

                    <div class="account-circle">

                        <!-- show account number -->
                        <h5 th:text="${account.accountNumber}"></h5>

                        <!-- show account type -->
                        <p th:text="${account.accountType}"></p>

                    </div>

                </div>

                <!-- action buttons -->
                <div class="col-md-8 d-flex align-items-center">

                    <div>

                        <!-- show only for admin -->
                        <div th:if="${user.role == 'ADMIN'}">
                            <a th:href="@{'/transactions/admin/deposit/' + ${account.id}}" class="btn btn-outline-success">Deposit</a>
                            <a  th:href="@{'/transactions/admin/withdraw/' + ${account.id}}" class="btn btn-outline-danger">Withdraw</a>
                        </div>

                        <!-- show only for customer -->
                        <div th:if="${user.role == 'CUSTOMER'}">
                            <a th:href="@{'/transactions/transfer/' + ${account.id}}" class="btn btn-outline-secondary">Transfer</a>
                        </div>

                    </div>

                </div>

            </div>

            <!-- if NO account -->
            <div th:if="${account == null}" class="mt-4">

                <!-- warning message -->
                <div class="alert alert-warning">
                    No account found. Please create an account first.
                </div>

                <!-- go to accounts -->
                <a href="/accounts" class="btn btn-outline-success">
                    Go to Accounts
                </a>

            </div>

            <!-- transaction history -->
            <!-- show only if account exists -->
            <div th:if="${account != null}" class="mt-5">

                <h4 class="text-success">Transaction History</h4>

                <table class="table table-bordered mt-3">

                    <thead>
                    <tr>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Date</th>
                    </tr>
                    </thead>

                    <tbody>

                    <!-- loop through transactions -->
                    <tr th:each="t : ${transactions}">
                        <td th:text="${t.type}"></td>
                        <td th:text="${t.amount}"></td>
                        <td th:text="${t.date}"></td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</body>
</html>
