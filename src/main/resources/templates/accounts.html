<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Accounts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- navbar -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h3 class="text-success">Your Accounts</h3>

    <a th:href="@{'/accounts/create/' + ${userId}}" class="btn btn-outline-success mb-3">
        Create Account
    </a>
    <!-- success message -->
    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span> <!-- display success message -->
    </div>

    <table class="table table-bordered">

        <thead>
        <tr>
            <th>Account Number</th>
            <th>Account Type</th>
            <th>Balance</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="acc : ${accounts}">
            <td th:text="${acc.accountNumber}"></td>
            <td th:text="${acc.accountType}"></td>
            <td th:text="${acc.balance}"></td>

            <td>
                <a th:href="@{'/transactions/' + ${acc.id}}" class="btn btn-outline-primary btn-sm">View</a>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
