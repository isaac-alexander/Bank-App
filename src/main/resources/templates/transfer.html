<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>transfer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h3 class="text-primary">transfer money</h3>

    <form method="post" action="/transactions/transfer">

        <input type="hidden" name="accountId" th:value="${accountId}">

        <input name="accountNumber" class="form-control mb-3" placeholder="receiver account number">

        <input name="amount" class="form-control mb-3" placeholder="amount">

        <input name="password" type="password" class="form-control mb-3" placeholder="password">

        <button class="btn btn-outline-primary">transfer</button>

    </form>

</div>

</body>
</html>
