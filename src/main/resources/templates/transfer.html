<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Transfer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="card card-custom form-card p-4">

        <h4 class="text-primary text-center mb-4">Transfer Money</h4>

        <form method="post"
              action="/transactions/transfer">

            <input type="hidden" name="accountId" th:value="${accountId}" required>

            <input name="accountNumber" class="form-control mb-3" placeholder="Receiver account number" required>

            <input name="amount" class="form-control mb-3" placeholder="Amount" required>

            <input name="password" type="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-primary w-100">Transfer</button>

        </form>

    </div>

</div>

</body>
</html>
