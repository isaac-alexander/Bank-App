<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Transactions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h3 class="text-success">Transactions</h3>

    <!-- admin buttons-->

    <!-- admin only buttons -->
    <div th:if="${session.loggedInUser != null && session.loggedInUser.role == 'ADMIN'}">
        <!-- deposit button -->
        <a th:href="@{'/transactions/admin/deposit/' + ${accountId}}"
           class="btn btn-outline-success">Deposit</a>
        <!-- withdraw button -->
        <a th:href="@{'/transactions/admin/withdraw/' + ${accountId}}"
           class="btn btn-outline-success">Withdraw</a>
    </div>

    <div id="flashMessage">
        <!-- success message -->
        <div th:if="${param.success}"
             class="alert alert-success">
            <span th:text="${param.success}"></span>
        </div>

        <!-- error message -->
        <div th:if="${param.error}"
             class="alert alert-danger">
            <span th:text="${param.error}"></span>
        </div>
    </div>


    <table class="table mt-3">

        <thead>
        <tr>
            <th>Type</th>
            <th>Amount</th>
            <th>Date</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="t : ${transactions}">
            <td th:text="${t.type}"></td>
            <td th:text="${t.amount}"></td>
            <td th:text="${t.date}"></td>
        </tr>
        </tbody>

    </table>

</div>

<script>
    setTimeout(function() {
        document.getElementById("flashMessage").style.display = "none";
    }, 5000); // 5 seconds
</script>

</body>
</html>
