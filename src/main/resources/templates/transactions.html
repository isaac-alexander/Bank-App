<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Transactions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h3 class="text-success">Transactions</h3>

    <a th:href="@{'/transactions/deposit/' + ${accountId}}" class="btn btn-outline-success">Deposit</a>
    <a th:href="@{'/transactions/withdraw/' + ${accountId}}" class="btn btn-outline-danger">Withdraw</a>

    <!-- success message -->
    <div th:if="${param.success}" class="alert alert-success">
        <span th:text="${param.success}"></span>
    </div>

    <!-- error message -->
    <div th:if="${param.error}" class="alert alert-danger">
        <span th:text="${param.error}"></span>
    </div>

    <table class="table mt-3">

        <thead>
        <tr>
            <th>Type</th>
            <th>Amount</th>
            <th>Date</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="t : ${transactions}">
            <td th:text="${t.type}"></td>
            <td th:text="${t.amount}"></td>
            <td th:text="${t.date}"></td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
