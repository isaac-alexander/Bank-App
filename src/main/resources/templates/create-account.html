<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h3 class="text-success">Create Account</h3>

    <form method="post" action="/accounts/create">

        <input type="hidden" name="userId" th:value="${userId}">

        <label th:for="${accountType}">Select Account Type</label>
            <select name="accountType" class="form-control mb-3">
                <option th:value="${savings}">Savings</option>
                <option th:value="${checking}">Checking</option>
            </select>


        <button class="btn btn-outline-success">Create</button>

    </form>

</div>

</body>
</html>
