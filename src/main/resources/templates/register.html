<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Registration</title>

    <!-- bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- centered card -->
    <div class="card mx-auto p-4 shadow" style="max-width:400px;">

        <!-- title -->
        <h3 class="text-center text-success">Create Account</h3>

        <!-- register form -->
        <form th:action="@{/register}" method="post" th:object="${user}">

            <!-- Username Input -->
            <label>Username:</label>
            <input type="text"
                   th:field="*{username}"
                   class="form-control mb-3"
                   placeholder="Enter Username"
                   required>

            <!-- Phone Number Input -->
            <label>Phone Number:</label>
            <input type="text" th:field="*{phoneNumber}"  class="form-control mb-3"
                   placeholder="Enter Phone Number"
                   required/>

            <!-- Password Input -->
            <label>Password:</label>
            <input type="password"
                   th:field="*{password}"
                   class="form-control mb-3"
                   placeholder="Enter Password"
                   required>

            <!-- submit button -->
            <button class="btn btn-outline-success w-100">
                Register
            </button>

        </form>

        <!-- link to login -->
        <a href="/login" class="text-center mt-3 d-block">
            Already have an account? Login
        </a>

    </div>

</div>

</body>
</html>
