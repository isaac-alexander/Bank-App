<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="/css/style.css">
</head>

<body>

<div class="container mt-5">
    <div class="card auth-card p-4">

        <h3 class="text-center text-success">Create Account</h3>

        <!-- success message -->
        <div th:if="${success}" class="alert alert-success">
            <p th:text="${success}"></p>
        </div>

        <form th:action="@{/user/register}" method="post" th:object="${user}">

            <input th:field="*{username}" class="form-control mb-3" placeholder="Username">

            <input th:field="*{phoneNumber}" class="form-control mb-3" placeholder="Phone">

            <input th:field="*{password}" type="password" class="form-control mb-3" placeholder="Password">

            <!-- account type selection added -->
            <select th:field="*{accountType}" class="form-control mb-3">
                <option value="SAVINGS">Savings</option>
                <option value="CHECKING">Checking</option>
            </select>

            <input th:field="*{firstName}" class="form-control mb-3" placeholder="First Name">

            <input th:field="*{lastName}" class="form-control mb-3" placeholder="Last Name">

            <input th:field="*{dateOfBirth}" type="date" class="form-control mb-3">

            <input th:field="*{address}" class="form-control mb-3" placeholder="Address">

            <button class="btn btn-success w-100">Register</button>
        </form>

        <!-- login link -->
        <a href="/login" class="d-block text-center mt-3">
            Already have an account? Login
        </a>

    </div>
</div>

</body>
</html>
