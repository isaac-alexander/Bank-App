<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Deposit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">

    <h3 class="text-success">Deposit Money</h3>

    <form method="post" th:action="@{/transactions/admin/deposit}">

        <input type="hidden" name="accountId" th:value="${accountId}">

        <input name="amount" class="form-control mb-3" placeholder="Enter amount">

        <input name="password" type="password" class="form-control mb-3" placeholder="Enter your password">

        <button class="btn btn-outline-success">Deposit</button>

    </form>

</div>

</body>
</html>
